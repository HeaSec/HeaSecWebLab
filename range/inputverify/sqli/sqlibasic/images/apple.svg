<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 红苹果 -->
  <ellipse cx="100" cy="120" rx="70" ry="65" fill="#e53e3e"/>
  <ellipse cx="100" cy="120" rx="70" ry="65" fill="url(#appleGrad)"/>
  <!-- 高光 -->
  <ellipse cx="75" cy="95" rx="20" ry="25" fill="rgba(255,255,255,0.25)" transform="rotate(-15,75,95)"/>
  <!-- 苹果顶部凹陷 -->
