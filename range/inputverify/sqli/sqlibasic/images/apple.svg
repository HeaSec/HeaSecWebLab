  <!-- 茎 -->
  <path d="M100 58 Q98 35 105 20" fill="none" stroke="#744210" stroke-width="4" stroke-linecap="round"/>
  <!-- 叶子 -->
  <path d="M105 32 Q120 20 135 28 Q120 35 105 32Z" fill="#48bb78"/>
  <path d="M108 32 Q118 25 130 30" fill="none" stroke="#38a169" stroke-width="1"/>
  <defs>
    <radialGradient id="appleGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fc8181"/>
      <stop offset="50%" stop-color="#e53e3e"/>
      <stop offset="100%" stop-color="#c53030"/>
