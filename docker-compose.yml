# HeaSec 天积安全靶场 — Docker Compose 编排
# 版本：v2.0.0 | 双官方镜像（php:7.3-apache + mysql:5.7）

services:
  db:
    platform: linux/amd64
    image: mysql:5.7
    container_name: heasec-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
    command:
      - --lower_case_table_names=1
      - --sql_mode=IGNORE_SPACE,ONLY_FULL_GROUP_BY,STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_AUTO_CREATE_USER,NO_ENGINE_SUBSTITUTION
      - --default-storage-engine=MyISAM
      - --character-set-server=utf8
      - --collation-server=utf8_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max-allowed-packet=16M
    volumes:
      - heasec_mysql_data:/var/lib/mysql
    networks:
      - heasec-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-proot", "-h", "127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    platform: linux/amd64
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: heasec/web:2.0.0
    container_name: heasec-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./docker/config/config.json:/var/www/html/config/config.json:ro
    networks:
      - heasec-net

volumes:
  heasec_mysql_data:

networks:
  heasec-net:
